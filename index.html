<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Uh Oh...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px;
      animation: fadeIn 1s ease-in;
    }

    .skull {
      font-size: 100px;
      animation: shake 0.5s infinite alternate;
    }

    h1 {
      color: #ff2222;
      font-size: 2.5rem;
      margin: 20px 0;
      text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
      animation: flicker 1.5s infinite;
    }

    p {
      color: #ffcc00;
      font-size: 1.4rem;
      margin-top: 15px;
      text-shadow: 0 0 10px #ffcc00;
    }

    .warning {
      margin-top: 30px;
      color: #ff6600;
      font-size: 1rem;
      border: 2px dashed #ff6600;
      padding: 15px 25px;
      border-radius: 8px;
      display: inline-block;
      animation: pulse 1s infinite;
    }

    @keyframes shake {
      from { transform: rotate(-10deg); }
      to   { transform: rotate(10deg); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.7; }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 5px #ff6600; }
      50%       { box-shadow: 0 0 20px #ff6600; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="skull">💀</div>
    <h1>YOU FELL FOR IT</h1>
    <p>and now I have ALL your stuff!!</p>
    <div class="warning">⚠️ Don't click on random links!! ⚠️</div>
  </div>
</body>
</html>
